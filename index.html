    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden; /* يمنع التمرير للحفاظ على تناسب الصورة */
            height: 100%;
            background-color: #0f0f1f; /* خلفية داكنة لتناسب الصورة */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حاوية الموقع الرئيسية التي تحتوي على الصورة */
        .site-viewport {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        .site-container {
            position: relative;
            /* يتم تعيين العرض والارتفاع كنسب مئوية للحفاظ على التجاوب */
            width: 100%;
            max-width: 1000px; /* الحد الأقصى للعرض الأصلي للصورة */
            aspect-ratio: 1000 / 563; /* نسبة العرض إلى الارتفاع للصورة الأصلية */
            background-image: url('image_0.png'); /* اسم ملف الصورة الخاصة بك */
            background-size: cover; /* لملء الحاوية بالصورة */
            background-position: center;
            background-repeat: no-repeat;
            margin: 0 auto;
        }

        /* تصميم أزرار التحميل */
        .download-button {
            position: absolute;
            background-color: transparent; /* جعل الخلفية شفافة للحفاظ على التصميم */
            color: #fff;
            border: 2px solid #b300ff; /* حدود بنفسجية نيون */
            border-radius: 10px;
            padding: 5px 15px;
            cursor: pointer;
            text-align: center;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(157, 0, 255, 0.4);
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
        }

        /* تأثير التمرير (Hover) */
        .download-button:hover {
            background-color: rgba(157, 0, 255, 0.6); /* خلفية بنفسجية عند التمرير */
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.8);
            transform: scale(1.05); /* تكبير طفيف للزر */
        }

        /* تأثير الضغط (Active) */
        .download-button:active {
            transform: scale(0.98);
        }

        /* تكييف الأزرار للشاشات الصغيرة */
        @media (max-width: 600px) {
            .download-button {
                font-size: 10px;
                padding: 3px 10px;
                border-radius: 5px;
            }
        }

        /* --- تموضع الأزرار فوق كل قسم --- */
