<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS3 BROTHERS - Simo PS3</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #9d00ff;
            --neon-glow: 0 0 15px rgba(157, 0, 255, 0.6);
            --bg-dark: rgba(15, 5, 30, 0.85);
            --border-radius: 15px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #2b0a4a 0%, #05010a 100%);
            color: #fff;
            min-height: 100vh;
            background-attachment: fixed;
        }

        /* حاوية الموقع الأساسية */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ترويسة الموقع (الهيدر) */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 3.5rem;
            margin: 0;
            font-style: italic;
            background: linear-gradient(to bottom, #d49aff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(157,0,255,0.5);
            font-weight: 900;
            letter-spacing: 2px;
        }
        .header p {
            margin: 5px 0;
            font-size: 1rem;
            letter-spacing: 3px;
            color: #bfa5d6;
        }

        /* رسالة الترحيب */
        .welcome-box {
            background: var(--bg-dark);
            border: 2px solid var(--primary-color);
            border-radius: var(--border-radius);
            padding: 15px 20px;
            text-align: center;
            box-shadow: var(--neon-glow);
            margin-bottom: 30px;
        }
        .welcome-box h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            color: #e5bfff;
        }
        .welcome-box p {
            margin: 0;
            font-size: 1.1rem;
        }

        /* تقسيم الأعمدة الثلاثة */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr;
            gap: 20px;
        }

        /* الصناديق الداخلية للأقسام */
        .section-box {
            background: var(--bg-dark);
            border: 2px solid #5a189a;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 0 10px rgba(90, 24, 154, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-title {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #d8a8ff;
            border-bottom: 1px solid rgba(157,0,255,0.3);
            padding-bottom: 10px;
            width: 100%;
        }

        /* أزرار التحميل */
        .download-btn {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: #fff;
            padding: 8px 30px;
            border-radius: 20px;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 5px rgba(157,0,255,0.2);
        }
        .download-btn:hover {
            background: var(--primary-color);
            box-shadow: var(--neon-glow);
            transform: scale(1.02);
        }

        /* تنسيق قسم المكتبات (اليسار في الصورة، اليمين في الكود لأن الاتجاه عربي) */
        .library-item {
            width: 100%;
            margin-bottom: 20px;
            text-align: center;
        }
        .library-item img {
            max-width: 150px;
            height: auto;
            margin-bottom: 10px;
        }

        /* تنسيق قسم التطبيقات (الوسط) */
        .app-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .app-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .app-item:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(157,0,255,0.2);
        }
        .app-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .app-info img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
        }
        .app-item .download-btn {
            width: auto;
            margin-top: 0;
            padding: 5px 15px;
            font-size: 0.9rem;
        }

        /* تنسيق قسم الثيمات (الأنمي) */
        .themes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }
        .theme-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .theme-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #7b2cbf;
            margin-bottom: 8px;
        }

        /* التجاوب مع شاشات الهواتف */
        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    
    <header class="header">
        <h1>PS3 BROTHERS</h1>
        <p>LIVE IN YOUR WORLD. PLAY IN OURS.</p>
    </header>

    <section class="welcome-box">
        <h2>مرحبا بك في موقع simo ps3</h2>
        <p>هنا تجد مختلف أشياء مميزة لتحميل على جهازك بلايستيشن 3 🔥</p>
    </section>

    <div class="grid-container">

        <div class="section-box">
            <div class="section-title">
                مكتبات تحميل<br>
                <small>ZUKOSTORE & VIDEO STORE</small>
            </div>
            
            <div class="library-item">
                <img src="https://via.placeholder.com/150x80/220044/ffffff?text=ZUKO+STORE" alt="ZUKO STORE">
                <button class="download-btn">تحميل المكتبة</button>
            </div>
            
            <div class="library-item">
                <img src="https://via.placeholder.com/150x80/220044/ffffff?text=VIDEO+STORE" alt="VIDEO STORE">
                <button class="download-btn">تحميل المكتبة</button>
            </div>
        </div>

        <div class="section-box">
            <div class="section-title">تطبيقات بلايستيشن 3</div>
            
            <div class="app-list">
                <div class="app-item">
                    <div class="app-info">
                        <img src="https://via.placeholder.com/40/333333/ffffff?text=M" alt="multiMAN">
                        <span>multiMAN</span>
                    </div>
                    <button class="download-btn">تحميل</button>
                </div>
                
                <div class="app-item">
                    <div class="app-info">
                        <img src="https://via.placeholder.com/40/333333/ffffff?text=W" alt="webMAN">
                        <span>webMAN</span>
                    </div>
                    <button class="download-btn">تحميل</button>
                </div>
                
                <div class="app-item">
                    <div class="app-info">
                        <img src="https://via.placeholder.com/40/333333/ffffff?text=A" alt="Apollo PS3">
                        <span>Apollo PS3</span>
                    </div>
                    <button class="download-btn">تحميل</button>
                </div>

                <div class="app-item">
                    <div class="app-info">
                        <img src="https://via.placeholder.com/40/333333/ffffff?text=C" alt="Controller Tester">
                        <span>Controller Tester</span>
                    </div>
                    <button class="download-btn">تحميل</button>
                </div>
            </div>
        </div>

        <div class="section-box">
            <div class="section-title">ثيمات أنميات متحركة</div>
            
            <div class="themes-grid">
                <div class="theme-item">
                    <img src="https://via.placeholder.com/150x120/110022/ffffff?text=Mikey" alt="Mikey Theme">
                    <button class="download-btn">تحميل الثيم</button>
                </div>
                
                <div class="theme-item">
                    <img src="https://via.placeholder.com/150x120/110022/ffffff?text=Gojo" alt="Gojo Theme">
                    <button class="download-btn">تحميل الثيم</button>
                </div>
                
                <div class="theme-item">
                    <img src="https://via.placeholder.com/150x120/110022/ffffff?text=Luffy" alt="Luffy Theme">
                    <button class="download-btn">تحميل الثيم</button>
                </div>
                
                <div class="theme-item">
                    <img src="https://via.placeholder.com/150x120/110022/ffffff?text=Zoro" alt="Zoro Theme">
                    <button class="download-btn">تحميل الثيم</button>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
