<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Arial Black',sans-serif;
    overflow:hidden;
}

.app-container{
    position:relative;
    width:100%;
    max-width:1920px;
    aspect-ratio:16/9;
    background-image:url('https://cdn.discordapp.com/attachments/1494419500890587186/1496460219037778000/Picsart_26-04-22_11-19-44-908.jpg?ex=69e9f6af&is=69e8a52f&hm=0eb92ad81502bd08279a972066dc4e1c87ca3605d4933470307469132651512f');
    background-size:100% 100%;
    background-position:center;
    background-repeat:no-repeat;
}

/* الأزرار */
.ps3-btn{
    position:absolute;
    background:transparent;
    color:#fff;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-weight:bold;
    text-transform:uppercase;

    /* أهم شيء */
    white-space:normal;
    word-break:break-word;
    line-height:1.05;
    overflow:hidden;
    padding:2px;

    transition:0.2s;
}

.ps3-btn:hover{
    transform:scale(1.08);
    text-shadow:0 0 8px #fff;
}

/* أحجام الخطوط */
.center-apps{font-size:1.10vw;}
.anime-themes{font-size:0.9vw;}
.store-main{font-size:0.95vw;}
.store-key{font-size:0.75vw;}
