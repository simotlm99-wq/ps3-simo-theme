<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة ثيمات وخلفيات PS3</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            /* إعدادات الخلفية الجديدة */
            background-image: url('image.png'); /* تأكد أن اسم الصورة مطابق لاسم ملف الصورة عندك */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; /* لون بديل في حال تأخر تحميل الصورة */
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        /* طبقة شفافة لجعل النص مقروءاً فوق الخلفية المليئة بالتفاصيل */
        .overlay {
            background-color: rgba(0, 0, 0, 0.75); /* لون أسود بشفافية 75% */
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #ffd700; /* لون ذهبي للعنوان */
            text-shadow: 2px 2px 5px #000; /* ظل لتوضيح النص في متصفح PS3 */
            margin-top: 20px;
        }

        p {
            font-size: 18px;
            text-shadow: 1px 1px 3px #000;
        }

        .themes-grid {
            /* استخدمنا text-align بدلاً من flex لتوافق 100% مع متصفح PS3 القديم */
            text-align: center;
            margin-top: 40px;
        }

        .card {
            background-color: #242424;
            padding: 15px;
            border-radius: 12px;
            width: 280px;
            /* التعديل الأهم لتوافق PS3 */
            display: inline-block; 
            margin: 15px;
            vertical-align: top;
            /* -------------------- */
            box-shadow: 0 5px 15px rgba(106, 27, 154, 0.8); 
            border: 1px solid #6a1b9a; /* إطار خفيف لتمييز البطاقة */
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px); 
        }

        .card img {
            width: 100%;
            height: 157px; 
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #333;
        }

        .card h3 {
            font-size: 18px;
            margin: 15px 0;
            color: #eeeeee;
        }

        .download-btn {
            display: block;
            padding: 10px;
            background-color: #6a1b9a; 
            color: #ffd700; 
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .download-btn:hover {
            background-color: #8e24aa; 
        }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>ثيمات وخلفيات PS3</h1>
        <p>حمّل أفضل الثيمات لتزيين جهازك</p>

        <div class="themes-grid">
            <div class="card">
                <img src="https://via.placeholder.com/400x225/333/fff?text=GTA+V+Theme" alt="صورة الثيم">
                <h3>ثيم GTA V المطور</h3>
                <a href="رابط_التحميل_هنا" class="download-btn">تحميل الثيم</a>
            </div>
            
            <div class="card">
                <img src="https://via.placeholder.com/400x225/333/fff?text=Dark+Background" alt="صورة الثيم">
                <h3>خلفية Dark Aesthetic</h3>
                <a href="رابط_التحميل_هنا" class="download-btn">تحميل الخلفية</a>
            </div>
        </div>
    </div>

</body>
</html>
